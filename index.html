      /* === Hormigas con trayectorias erráticas sobre FUMIGATRON === */
      .logo-orbit-wrapper {
        position: relative;
        display: inline-block;
      }
      .ants-over-text {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: 10;
      }
      .ant-over {
        position: absolute;
        width: 14px;
        height: 10px;
      }
      /* Hormiga 1: va por arriba, ligeramente errática */
      .ant-over:nth-child(1) {
        animation: antPath1 4.5s linear infinite;
      }
      @keyframes antPath1 {
        0%   { left: -18px; top: 0%; }
        20%  { left: 20%;   top: 10%; }
        40%  { left: 40%;   top: 0%; }
        60%  { left: 60%;   top: 15%; }
        80%  { left: 80%;   top: 5%; }
        100% { left: calc(100% + 18px); top: 0%; }
      }
      /* Hormiga 2: va por el medio con más movimiento */
      .ant-over:nth-child(2) {
        animation: antPath2 5.5s linear infinite;
        animation-delay: -2s;
      }
      @keyframes antPath2 {
        0%   { left: -18px; top: 30%; }
        15%  { left: 15%;   top: 60%; }
        30%  { left: 30%;   top: 20%; }
        50%  { left: 50%;   top: 55%; }
        70%  { left: 70%;   top: 25%; }
        85%  { left: 85%;   top: 50%; }
        100% { left: calc(100% + 18px); top: 30%; }
      }
      /* Hormiga 3: va por abajo, más lenta */
      .ant-over:nth-child(3) {
        animation: antPath3 6s linear infinite;
        animation-delay: -1s;
      }
      @keyframes antPath3 {
        0%   { left: -18px; top: 55%; }
        25%  { left: 25%;   top: 40%; }
        45%  { left: 45%;   top: 65%; }
        65%  { left: 65%;   top: 45%; }
        85%  { left: 85%;   top: 60%; }
        100% { left: calc(100% + 18px); top: 55%; }
      }
      /* Hormiga 4: va por el centro-alto, velocidad media */
      .ant-over:nth-child(4) {
        animation: antPath4 5s linear infinite;
        animation-delay: -2.5s;
      }
      @keyframes antPath4 {
        0%   { left: -18px; top: 20%; }
        20%  { left: 20%;   top: 45%; }
        35%  { left: 35%;   top: 10%; }
        55%  { left: 55%;   top: 40%; }
        75%  { left: 75%;   top: 15%; }
        90%  { left: 90%;   top: 35%; }
        100% { left: calc(100% + 18px); top: 20%; }
      }
      /* Leg swing */
      .ant-leg-front { animation: legSwingF 0.3s ease-in-out infinite alternate; }
      .ant-leg-mid   { animation: legSwingM 0.3s ease-in-out infinite alternate-reverse; }
      .ant-leg-back  { animation: legSwingB 0.3s ease-in-out infinite alternate; }
      @keyframes legSwingF { from { rotate: -25deg; } to { rotate: 25deg; } }
      @keyframes legSwingM { from { rotate: -18deg; } to { rotate: 18deg; } }
      @keyframes legSwingB { from { rotate: -25deg; } to { rotate: 25deg; } }
      .ant-antenna { transform-origin: 0% 100%; animation: antennaWiggle 0.5s ease-in-out infinite alternate; }
      @keyframes antennaWiggle { from { rotate: -12deg; } to { rotate: 12deg; } }
